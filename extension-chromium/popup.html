<!DOCTYPE html>
<html>
<head>
  <meta charset="utf-8" />
  <style>
    body { width: 280px; margin: 0; font: 13px/1.4 system-ui, sans-serif; background: #0f172a; color: #e2e8f0; }
    header { padding: 12px 14px; font-weight: 600; font-size: 15px; background: #1e293b; }
    .body { padding: 12px 14px; }
    input { width: 100%; box-sizing: border-box; padding: 8px; border-radius: 6px; border: 1px solid #334155; background: #0b1220; color: #e2e8f0; }
    button { margin-top: 8px; width: 100%; padding: 8px; border: 0; border-radius: 6px; background: #3b82f6; color: #fff; cursor: pointer; font-weight: 600; }
    .row { display: flex; align-items: center; justify-content: space-between; margin-top: 10px; }
    .muted { color: #94a3b8; font-size: 12px; }
    #media { margin-top: 10px; }
    .media-item { padding: 6px 8px; margin-top: 4px; background: #1e293b; border-radius: 6px; cursor: pointer; }
  </style>
</head>
<body>
  <header>⬇ Nexa Download Manager</header>
  <div class="body">
    <input id="url" type="text" placeholder="Paste a URL to download…" />
    <button id="add">Download with Nexa</button>
    <div class="row">
      <span class="muted">Intercept browser downloads</span>
      <input id="enabled" type="checkbox" style="width:auto" />
    </div>
    <div id="media"></div>
  </div>
  <script src="popup.js"></script>
</body>
</html>
