name: build

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]
  workflow_dispatch:

# The release steps create GitHub Releases, which needs write access. The repo's
# default workflow token is read-only — that caused 403 "Resource not accessible
# by integration" and silently skipped publishing. Grant it explicitly here.
permissions:
  contents: write

jobs:
  # ── Linux CI ───────────────────────────────────────────────────────────────
  linux:
    name: Build + .deb package (Ubuntu)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Install toolchain
        run: |
          sudo apt-get update
          sudo apt-get install -y cmake ninja-build \
            qt6-base-dev libqt6sql6-sqlite \
            libtorrent-rasterbar-dev \
            patchelf file \
            ffmpeg yt-dlp aria2 \
            dpkg-dev

      - name: Configure & Build
        run: |
          cmake -B build -G Ninja \
            -DCMAKE_BUILD_TYPE=Release \
            -DCMAKE_INSTALL_PREFIX=/usr
          cmake --build build

      - name: Smoke test
        run: test -x build/nexa && test -x build/nexa-host && echo "Build OK"

      - name: Gather FULL dependency closure (linuxdeploy + Qt plugins)
        run: |
          set -e
          # linuxdeploy copies the COMPLETE recursive library closure of nexa +
          # nexa-host (Qt6, libtorrent, boost, ssl, ICU, fontconfig, freetype,
          # harfbuzz, xcb, libpng, …) and bundles the Qt platform / sqldrivers /
          # tls / imageformats / iconengines plugins. AppImages need FUSE (absent
          # on CI), so we --appimage-extract and run the inner AppRun directly.
          dl() { curl -sSL "$1" -o "$2"; chmod +x "$2"; }
          dl https://github.com/linuxdeploy/linuxdeploy/releases/download/continuous/linuxdeploy-x86_64.AppImage linuxdeploy
          dl https://github.com/linuxdeploy/linuxdeploy-plugin-qt/releases/download/continuous/linuxdeploy-plugin-qt-x86_64.AppImage linuxdeploy-plugin-qt
          ./linuxdeploy            --appimage-extract >/dev/null && mv squashfs-root ld
          ./linuxdeploy-plugin-qt  --appimage-extract >/dev/null && mv squashfs-root ldqt
          # linuxdeploy discovers its qt plugin by name on PATH
          ln -sf "$PWD/ldqt/AppRun" ld/usr/bin/linuxdeploy-plugin-qt
          export PATH="$PWD/ld/usr/bin:$PATH"
          export QMAKE="$(command -v qmake6)"
          [ -n "$QMAKE" ] || { echo "ERROR: qmake6 not found (qt6-base-dev missing?)"; exit 1; }
          command -v linuxdeploy-plugin-qt >/dev/null \
            || { echo "ERROR: linuxdeploy-plugin-qt not discoverable on PATH"; exit 1; }
          mkdir -p AppDir
          # xcb is the only platform plugin we bundle: it serves X11 AND XWayland,
          # which runs on essentially every desktop Wayland session — so a separate
          # (and fiddly-to-bundle) wayland plugin set isn't worth the surface area.
          ./ld/AppRun --appdir AppDir \
            -e build/nexa -e build/nexa-host \
            --plugin qt

          # DENY = the only libraries we DON'T bundle, because they must come from
          # the host: glibc (ABI-tied to the kernel), libstdc++/libgcc (forward-
          # compatible, safer from the host) and the GPU/GL driver stack (bundling
          # a driver lib black-screens/crashes on a different GPU). Everything else
          # gets bundled. These are declared as Depends below.
          DENY='^(ld-linux.*|libc|libm|libdl|libpthread|librt|libresolv|libnss_[a-z]+|libstdc\+\+|libgcc_s|libGL|libGLX|libGLdispatch|libOpenGL|libEGL|libdrm|libgbm|libglapi)\.so'

          # linuxdeploy honours the AppImage excludelist, which deliberately does
          # NOT bundle libfontconfig / libfreetype / libharfbuzz / libSM / libICE
          # (and the GL stack). For a TRUE offline bundle we resolve the full
          # recursive closure of both binaries AND every bundled plugin ourselves,
          # copying any non-DENY lib linuxdeploy left behind. Several passes let
          # newly-copied libs pull in their own deps until it converges.
          for pass in 1 2 3 4 5 6; do
            { find AppDir/usr/lib AppDir/usr/plugins -name '*.so*' -type f
              echo build/nexa; echo build/nexa-host; } | while IFS= read -r obj; do
              ldd "$obj" 2>/dev/null | awk '/=> \//{print $3}'
            done | sort -u | while IFS= read -r lib; do
              base="$(basename "$lib")"
              echo "$base" | grep -qE "$DENY" && continue
              [ -e "AppDir/usr/lib/$base" ] && continue
              cp -Ln "$lib" AppDir/usr/lib/ 2>/dev/null && echo "  + bundled $base"
            done
          done

          # Drop any DENY lib linuxdeploy may have bundled (so it stays host-side).
          for f in $(ls AppDir/usr/lib); do
            echo "$f" | grep -qE "$DENY" && rm -f "AppDir/usr/lib/$f"
          done || true

          echo "=== libs bundled: $(ls AppDir/usr/lib | wc -l) ===" && ls AppDir/usr/lib | sort
          echo "=== plugins bundled ===" && find AppDir/usr/plugins -type f | sort
          for d in platforms sqldrivers tls imageformats iconengines styles; do
            echo "  $d: $(find AppDir/usr/plugins/$d -name '*.so' 2>/dev/null | wc -l) plugin(s)"
          done
          # Hard requirements: the xcb platform plugin (GUI can't start without it)
          # and at least one TLS backend (every https download fails without it).
          test -f AppDir/usr/plugins/platforms/libqxcb.so
          test -n "$(find AppDir/usr/plugins/tls -name '*.so' 2>/dev/null)"

      - name: Download yt-dlp binary
        run: |
          sudo curl -L "https://github.com/yt-dlp/yt-dlp/releases/latest/download/yt-dlp" \
            -o /usr/local/bin/yt-dlp
          sudo chmod +x /usr/local/bin/yt-dlp

      - name: Build self-contained .deb (all dependencies bundled)
        run: |
          set -e
          PKG=nexa_0.1.0_amd64
          mkdir -p ${PKG}/DEBIAN
          mkdir -p ${PKG}/usr/bin
          mkdir -p ${PKG}/usr/lib/nexa
          mkdir -p ${PKG}/usr/share/applications
          mkdir -p ${PKG}/usr/share/icons/hicolor/256x256/apps
          mkdir -p ${PKG}/usr/share/pixmaps
          mkdir -p ${PKG}/usr/share/nexa

          # ── Binaries ──────────────────────────────────────────────────────
          cp build/nexa       ${PKG}/usr/lib/nexa/nexa
          cp build/nexa-host  ${PKG}/usr/lib/nexa/nexa-host
          chmod +x ${PKG}/usr/lib/nexa/nexa ${PKG}/usr/lib/nexa/nexa-host

          # ── Wrapper scripts in /usr/bin (launch from lib dir) ─────────────
          cat > ${PKG}/usr/bin/nexa <<'SH'
          #!/bin/sh
          exec /usr/lib/nexa/nexa "$@"
          SH
          cat > ${PKG}/usr/bin/nexa-host <<'SH'
          #!/bin/sh
          exec /usr/lib/nexa/nexa-host "$@"
          SH
          chmod +x ${PKG}/usr/bin/nexa ${PKG}/usr/bin/nexa-host

          # ── Bundle the FULL closure gathered by linuxdeploy (every lib + all
          #    Qt plugins) so the app runs on a clean machine with NO Qt or
          #    libtorrent installed. Only glibc + libstdc++/libgcc + the GL stack
          #    stay host-provided (declared as Depends below). ─────────────────
          cp -a AppDir/usr/lib/.   ${PKG}/usr/lib/nexa/
          cp -a AppDir/usr/plugins ${PKG}/usr/lib/nexa/plugins

          # A co-located qt.conf points Qt at the bundled plugins no matter how
          # the binary is launched — GUI wrapper, .desktop entry, or nexa-host
          # spawned directly by the browser (none of which set QT_PLUGIN_PATH).
          cat > ${PKG}/usr/lib/nexa/qt.conf <<'QTCONF'
          [Paths]
          Plugins = plugins
          QTCONF

          # rpath $ORIGIN so BOTH binaries find the co-located .so files with no
          # LD_LIBRARY_PATH — essential for nexa-host, which the browser launches
          # straight from the native-host manifest (never through our wrapper).
          patchelf --set-rpath '$ORIGIN' ${PKG}/usr/lib/nexa/nexa
          patchelf --set-rpath '$ORIGIN' ${PKG}/usr/lib/nexa/nexa-host
          # Qt plugins sit in plugins/<type>/ — two dirs below the bundled .so
          # files. linuxdeploy set their rpath for an AppDir layout (../../lib);
          # rewrite it for OUR layout so a dlopen'd plugin (xcb, openssl, sqlite)
          # finds libxcb / libssl / libQt6* in ../.. . Without this the plugins
          # load nothing on a clean machine — the verify-offline job asserts it.
          find ${PKG}/usr/lib/nexa/plugins -name '*.so' -type f \
            -exec patchelf --set-rpath '$ORIGIN/../..' {} +
          # Every bundled top-level lib also gets $ORIGIN so a lib's OWN deps (e.g.
          # libfontconfig -> libfreetype, libharfbuzz) resolve to co-located libs.
          # DT_RUNPATH isn't transitive, so each object must carry its own rpath.
          for so in ${PKG}/usr/lib/nexa/*.so*; do
            [ -f "$so" ] && patchelf --set-rpath '$ORIGIN' "$so" 2>/dev/null || true
          done

          # ── yt-dlp + ffmpeg (self-contained, no apt needed) ───────────────
          cp /usr/local/bin/yt-dlp ${PKG}/usr/lib/nexa/yt-dlp
          cp /usr/bin/ffmpeg       ${PKG}/usr/lib/nexa/ffmpeg 2>/dev/null || true
          chmod +x ${PKG}/usr/lib/nexa/yt-dlp ${PKG}/usr/lib/nexa/ffmpeg 2>/dev/null || true

          # ── Icons & desktop entry ─────────────────────────────────────────
          cp assets/nexa-256.png ${PKG}/usr/share/icons/hicolor/256x256/apps/nexa.png
          cp assets/nexa.png     ${PKG}/usr/share/pixmaps/nexa.png

          cat > ${PKG}/usr/share/applications/nexa.desktop <<'DESK'
          [Desktop Entry]
          Type=Application
          Version=1.0
          Name=Nexa Download Manager
          GenericName=Download Manager
          Comment=Fast multi-protocol download manager
          Exec=/usr/bin/nexa %U
          TryExec=/usr/bin/nexa
          Icon=nexa
          Terminal=false
          Categories=Network;FileTransfer;Qt;
          Keywords=download;torrent;video;hls;
          StartupNotify=true
          StartupWMClass=nexa
          DESK

          # ── Extensions — all 4 browsers ──────────────────────────────────
          # Chrome / Edge / Brave (Chromium-based — same MV3 extension)
          cp -r extension-chromium ${PKG}/usr/share/nexa/extension-chromium
          # Firefox (MV2, browser_specific_settings, background script)
          cp -r extension-firefox  ${PKG}/usr/share/nexa/extension-firefox

          # ── Native messaging manifests ────────────────────────────────────
          CHROME_ORIGINS='["chrome-extension://cbogjffoidaepbcbogbfibnldhkckhpb/"]'
          CHROME_JSON="{\"name\":\"com.nexa.host\",\"description\":\"Nexa Download Manager\",\"path\":\"/usr/lib/nexa/nexa-host\",\"type\":\"stdio\",\"allowed_origins\":${CHROME_ORIGINS}}"
          FIREFOX_JSON='{"name":"com.nexa.host","description":"Nexa Download Manager","path":"/usr/lib/nexa/nexa-host","type":"stdio","allowed_extensions":["nexa@nexa.local"]}'

          # Google Chrome
          mkdir -p ${PKG}/etc/opt/chrome/native-messaging-hosts
          echo "$CHROME_JSON" > ${PKG}/etc/opt/chrome/native-messaging-hosts/com.nexa.host.json

          # Chromium
          mkdir -p ${PKG}/etc/chromium/native-messaging-hosts
          echo "$CHROME_JSON" > ${PKG}/etc/chromium/native-messaging-hosts/com.nexa.host.json

          # Microsoft Edge
          mkdir -p ${PKG}/etc/opt/edge/native-messaging-hosts
          echo "$CHROME_JSON" > ${PKG}/etc/opt/edge/native-messaging-hosts/com.nexa.host.json

          # Brave Browser
          mkdir -p "${PKG}/etc/opt/brave/native-messaging-hosts"
          echo "$CHROME_JSON" > "${PKG}/etc/opt/brave/native-messaging-hosts/com.nexa.host.json"

          # Firefox
          mkdir -p ${PKG}/usr/lib/mozilla/native-messaging-hosts
          echo "$FIREFOX_JSON" > ${PKG}/usr/lib/mozilla/native-messaging-hosts/com.nexa.host.json

          # ── Set LD_LIBRARY_PATH wrapper so bundled libs are found ─────────
          cat > ${PKG}/usr/bin/nexa <<'SH'
          #!/bin/sh
          export LD_LIBRARY_PATH=/usr/lib/nexa:$LD_LIBRARY_PATH
          export PATH=/usr/lib/nexa:$PATH
          exec /usr/lib/nexa/nexa "$@"
          SH
          chmod +x ${PKG}/usr/bin/nexa

          # ── Postinst: update icon/desktop caches + aria2 install ──────────
          cat > ${PKG}/DEBIAN/postinst <<'POST'
          #!/bin/sh
          update-desktop-database /usr/share/applications 2>/dev/null || true
          gtk-update-icon-cache /usr/share/icons/hicolor 2>/dev/null || true
          echo ""
          echo "=========================================="
          echo "  Nexa Download Manager installed!"
          echo "=========================================="
          echo ""
          echo "Load browser extension:"
          echo ""
          echo "  Chrome / Edge / Brave:"
          echo "    1. Open chrome://extensions (or edge://extensions / brave://extensions)"
          echo "    2. Enable Developer mode"
          echo "    3. Load unpacked -> /usr/share/nexa/extension-chromium"
          echo ""
          echo "  Firefox:"
          echo "    1. Open about:debugging -> This Firefox"
          echo "    2. Load Temporary Add-on -> /usr/share/nexa/extension-firefox/manifest.json"
          echo "    (For permanent: sign & submit to addons.mozilla.org)"
          echo ""
          echo "Native messaging host is auto-registered for all browsers."
          echo "=========================================="
          POST
          chmod 755 ${PKG}/DEBIAN/postinst

          # ── control file — NO external dependencies required ──────────────
          INSTALLED_SIZE=$(du -sk ${PKG} | cut -f1)
          cat > ${PKG}/DEBIAN/control <<CTRL
          Package: nexa
          Version: 0.1.0
          Architecture: amd64
          Maintainer: Nexa <tauseeqtufail649@gmail.com>
          Installed-Size: ${INSTALLED_SIZE}
          Depends: libc6, libstdc++6, libgcc-s1, libgl1, libglx0, libopengl0, libegl1
          Description: Nexa Download Manager
           Fast multi-protocol download manager with browser integration.
           Supports HTTP/HTTPS segmented downloads, HLS video streams,
           BitTorrent, and site-specific media via yt-dlp.
           Includes yt-dlp and ffmpeg — no extra installs needed.
          CTRL

          # ── Build the package ─────────────────────────────────────────────
          dpkg-deb --build ${PKG}
          ls -lh ${PKG}.deb
          echo "✅ Self-contained .deb ready: $(du -sh ${PKG}.deb | cut -f1)"

      - name: Upload .deb artifact
        uses: actions/upload-artifact@v4
        with:
          name: nexa-linux-amd64-deb
          path: nexa_0.1.0_amd64.deb
          retention-days: 90

      - name: Create GitHub Release (Linux .deb)
        if: github.ref == 'refs/heads/main'
        continue-on-error: true
        uses: softprops/action-gh-release@v2
        with:
          tag_name: build-${{ github.run_number }}
          name: "Nexa Download Manager — Build ${{ github.run_number }}"
          body: |
            ## Nexa Download Manager

            ### Linux (.deb — Ubuntu/Debian/Kali):
            ```bash
            sudo dpkg -i nexa_*.deb
            sudo apt-get install -f   # fix any missing deps
            ```

            ### Windows (.exe installer):
            - Run `NexaSetup.exe` as administrator
            - Load Chrome extension from `C:\Program Files\Nexa Download Manager\extension-chromium`

            Built from: ${{ github.sha }}
          files: |
            nexa_0.1.0_amd64.deb
          draft: false
          prerelease: false
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

  # ── Windows self-contained installer via MSYS2/MinGW ──────────────────────
  # MSYS2 has pre-built Qt6 + libtorrent + ffmpeg — no vcpkg compile needed.
  windows:
    name: Windows installer (MSYS2 + full torrent)
    runs-on: windows-latest
    if: github.event_name != 'pull_request'
    defaults:
      run:
        shell: msys2 {0}

    steps:
      - uses: actions/checkout@v4

      - name: Setup MSYS2 + MinGW64
        uses: msys2/setup-msys2@v2
        with:
          msystem: MINGW64
          update: true
          install: >-
            mingw-w64-x86_64-gcc
            mingw-w64-x86_64-cmake
            mingw-w64-x86_64-ninja
            mingw-w64-x86_64-qt6-base
            mingw-w64-x86_64-qt6-tools
            mingw-w64-x86_64-libtorrent-rasterbar
            mingw-w64-x86_64-pkg-config
            mingw-w64-x86_64-ffmpeg

      - name: Configure
        run: |
          cmake -B build -G Ninja \
            -DCMAKE_BUILD_TYPE=Release \
            -DCMAKE_PREFIX_PATH=/mingw64

      - name: Build
        run: cmake --build build

      - name: Verify binaries
        run: |
          ls -lh build/nexa.exe build/nexa-host.exe
          echo "Build OK"

      - name: Bundle app + Qt DLLs
        run: |
          set -e
          mkdir -p dist

          # Copy binaries
          cp build/nexa.exe      dist/
          cp build/nexa-host.exe dist/

          # Use ldd to find all required DLLs automatically (no hardcoded paths)
          echo "=== Collecting DLLs via ldd ==="
          ldd build/nexa.exe | grep -i mingw64 | awk '{print $3}' | xargs -I{} cp -n {} dist/ 2>/dev/null || true
          ldd build/nexa-host.exe | grep -i mingw64 | awk '{print $3}' | xargs -I{} cp -n {} dist/ 2>/dev/null || true

          # Qt plugins (use MSYS2 path, works regardless of install location)
          QTPLUGINS=$(qmake6 -query QT_INSTALL_PLUGINS 2>/dev/null || echo "/mingw64/share/qt6/plugins")
          mkdir -p dist/platforms dist/sqldrivers dist/styles
          cp "${QTPLUGINS}/platforms/qwindows.dll"  dist/platforms/ 2>/dev/null || \
          cp /mingw64/share/qt6/plugins/platforms/qwindows.dll dist/platforms/
          cp "${QTPLUGINS}/sqldrivers/qsqlite.dll"  dist/sqldrivers/ 2>/dev/null || \
          cp /mingw64/share/qt6/plugins/sqldrivers/qsqlite.dll dist/sqldrivers/
          cp /mingw64/share/qt6/plugins/styles/qwindowsvistastyle.dll dist/styles/ 2>/dev/null || true

          # The QSQLITE driver plugin (qsqlite.dll) is loaded at RUNTIME and depends
          # on libsqlite3-0.dll — a dep of the PLUGIN, not of nexa.exe — so the
          # ldd-on-exe pass missed it and Qt reported
          # "QSqlDatabase: can not load requested driver 'QSQLITE'". Pull the
          # plugin's own deps + glob libsqlite3 directly.
          ldd dist/sqldrivers/qsqlite.dll 2>/dev/null | grep -i mingw64 | awk '{print $3}' | xargs -I{} cp -n {} dist/ 2>/dev/null || true
          cp -n /mingw64/bin/libsqlite3-*.dll dist/ 2>/dev/null || true

          # Qt TLS backends are loaded at RUNTIME via the plugin loader, so `ldd`
          # on the exe never lists them. Without this folder Qt prints
          # "No functional TLS backend was found" and every https request fails
          # on a clean PC. Bundle the whole tls/ dir (schannel + openssl backends).
          mkdir -p dist/tls
          cp "${QTPLUGINS}/tls/"*.dll dist/tls/ 2>/dev/null || \
          cp /mingw64/share/qt6/plugins/tls/*.dll dist/tls/
          # The openssl backend depends on libssl/libcrypto, which are deps of the
          # PLUGIN (not of nexa.exe), so the ldd-on-exe pass above missed them.
          # Resolve the plugin's own deps, plus a direct glob as a fallback.
          ldd dist/tls/qopensslbackend.dll 2>/dev/null | grep -i mingw64 | awk '{print $3}' | xargs -I{} cp -n {} dist/ 2>/dev/null || true
          cp -n /mingw64/bin/libssl-*.dll    dist/ 2>/dev/null || true
          cp -n /mingw64/bin/libcrypto-*.dll dist/ 2>/dev/null || true
          echo "=== tls backends bundled ===" && ls dist/tls/

          # Image-format plugins are ALSO runtime-loaded (ldd misses them). PNG is
          # built into Qt6Gui, but SVG/JPEG/ICO are not — without these a clean PC
          # shows broken icons/logo. Bundle the folder + pull each plugin's own deps
          # (e.g. qsvg.dll needs Qt6Svg.dll, which nexa.exe may not link directly).
          mkdir -p dist/imageformats
          cp "${QTPLUGINS}/imageformats/"*.dll dist/imageformats/ 2>/dev/null || \
          cp /mingw64/share/qt6/plugins/imageformats/*.dll dist/imageformats/ 2>/dev/null || true
          for p in dist/imageformats/*.dll; do
            ldd "$p" 2>/dev/null | grep -i mingw64 | awk '{print $3}' | xargs -I{} cp -n {} dist/ 2>/dev/null || true
          done
          echo "=== imageformats bundled ===" && ls dist/imageformats/

          echo "dist contents: $(ls dist/ | wc -l) files"
          ls dist/*.dll | head -20

      - name: Bundle yt-dlp
        shell: pwsh
        run: |
          Invoke-WebRequest `
            -Uri "https://github.com/yt-dlp/yt-dlp/releases/latest/download/yt-dlp.exe" `
            -OutFile dist\yt-dlp.exe
          Write-Host "yt-dlp bundled"

      - name: Bundle ffmpeg
        run: |
          # Try MSYS2 ffmpeg first (already installed), else download static build
          if [ -f /mingw64/bin/ffmpeg.exe ]; then
            cp /mingw64/bin/ffmpeg.exe dist/
            echo "ffmpeg bundled from MSYS2"
          else
            curl -sL "https://github.com/BtbN/FFmpeg-Builds/releases/download/latest/ffmpeg-master-latest-win64-gpl.zip" \
              -o ffmpeg.zip
            unzip -j ffmpeg.zip "*/ffmpeg.exe" -d dist/
            rm ffmpeg.zip
            echo "ffmpeg bundled from download"
          fi
          ls -lh dist/ffmpeg.exe

      - name: Bundle extensions (Chrome/Edge/Brave + Firefox)
        run: |
          cp -r extension-chromium dist/extension-chromium
          cp -r extension-firefox  dist/extension-firefox

      - name: Write native host manifest
        run: |
          # `path` is RELATIVE — Chrome/Chromium on Windows resolve a native-host
          # manifest path relative to the manifest file's own directory, and
          # com.nexa.host.json sits next to nexa-host.exe in $INSTDIR. This avoids
          # baking an install path (and its JSON backslash-escaping) into NSIS.
          # The old "INSTDIR\\nexa-host.exe" placeholder was never substituted, so
          # Chrome reported "Specified native messaging host not found".
          echo '{"name":"com.nexa.host","description":"Nexa Download Manager","path":"nexa-host.exe","type":"stdio","allowed_origins":["chrome-extension://cbogjffoidaepbcbogbfibnldhkckhpb/"]}' \
            > dist/manifest_template.json

      - name: Install NSIS
        shell: pwsh
        run: choco install nsis --no-progress -y

      - name: Generate NSIS installer script
        shell: pwsh
        run: |
          $lines = @(
            '!include "MUI2.nsh"',
            'Name "Nexa Download Manager"',
            'OutFile "NexaSetup.exe"',
            'Unicode True',
            'InstallDir "$PROGRAMFILES64\Nexa Download Manager"',
            'RequestExecutionLevel admin',
            '!define MUI_ABORTWARNING',
            '!insertmacro MUI_PAGE_WELCOME',
            '!insertmacro MUI_PAGE_DIRECTORY',
            '!insertmacro MUI_PAGE_INSTFILES',
            '!define MUI_FINISHPAGE_RUN "$INSTDIR\nexa.exe"',
            '!define MUI_FINISHPAGE_RUN_TEXT "Launch Nexa Download Manager"',
            '!insertmacro MUI_PAGE_FINISH',
            '!insertmacro MUI_UNPAGE_CONFIRM',
            '!insertmacro MUI_UNPAGE_INSTFILES',
            '!insertmacro MUI_LANGUAGE "English"',
            '',
            'Section "Install"',
            '  SetOutPath "$INSTDIR"',
            '  File /r "dist\*"',
            '  ; Write native messaging host manifest',
            '  FileOpen $0 "$INSTDIR\manifest_template.json" r',
            '  FileOpen $1 "$INSTDIR\com.nexa.host.json" w',
            '  loop:',
            '    FileRead $0 $2',
            '    IfErrors done',
            '    FileWrite $1 $2',
            '    Goto loop',
            '  done:',
            '  FileClose $0',
            '  FileClose $1',
            '  Delete "$INSTDIR\manifest_template.json"',
            '  ; Register native host for Chrome, Chromium, Edge, Brave',
            '  WriteRegStr HKCU "Software\Google\Chrome\NativeMessagingHosts\com.nexa.host" "" "$INSTDIR\com.nexa.host.json"',
            '  WriteRegStr HKCU "Software\Chromium\NativeMessagingHosts\com.nexa.host" "" "$INSTDIR\com.nexa.host.json"',
            '  WriteRegStr HKCU "Software\Microsoft\Edge\NativeMessagingHosts\com.nexa.host" "" "$INSTDIR\com.nexa.host.json"',
            '  WriteRegStr HKCU "Software\BraveSoftware\Brave-Browser\NativeMessagingHosts\com.nexa.host" "" "$INSTDIR\com.nexa.host.json"',
            '  WriteRegStr HKCU "Software\Microsoft\Windows\CurrentVersion\Run" "NexaDL" "$\"$INSTDIR\nexa.exe$\" --background"',
            '  WriteRegStr HKCU "Software\Microsoft\Windows\CurrentVersion\Uninstall\NexaDL" "DisplayName" "Nexa Download Manager"',
            '  WriteRegStr HKCU "Software\Microsoft\Windows\CurrentVersion\Uninstall\NexaDL" "UninstallString" "$\"$INSTDIR\uninstall.exe$\""',
            '  WriteRegStr HKCU "Software\Microsoft\Windows\CurrentVersion\Uninstall\NexaDL" "DisplayIcon" "$INSTDIR\nexa.exe"',
            '  WriteUninstaller "$INSTDIR\uninstall.exe"',
            '  CreateDirectory "$SMPROGRAMS\Nexa Download Manager"',
            '  CreateShortCut "$SMPROGRAMS\Nexa Download Manager\Nexa.lnk" "$INSTDIR\nexa.exe"',
            '  CreateShortCut "$DESKTOP\Nexa Download Manager.lnk" "$INSTDIR\nexa.exe"',
            'SectionEnd',
            '',
            'Section "Uninstall"',
            '  DeleteRegValue HKCU "Software\Microsoft\Windows\CurrentVersion\Run" "NexaDL"',
            '  DeleteRegKey HKCU "Software\Google\Chrome\NativeMessagingHosts\com.nexa.host"',
            '  DeleteRegKey HKCU "Software\Chromium\NativeMessagingHosts\com.nexa.host"',
            '  DeleteRegKey HKCU "Software\Microsoft\Edge\NativeMessagingHosts\com.nexa.host"',
            '  DeleteRegKey HKCU "Software\BraveSoftware\Brave-Browser\NativeMessagingHosts\com.nexa.host"',
            '  DeleteRegKey HKCU "Software\Microsoft\Windows\CurrentVersion\Uninstall\NexaDL"',
            '  RMDir /r "$INSTDIR"',
            '  Delete "$DESKTOP\Nexa Download Manager.lnk"',
            '  RMDir /r "$SMPROGRAMS\Nexa Download Manager"',
            'SectionEnd'
          )
          $lines | Set-Content installer.nsi -Encoding UTF8
          Write-Host "NSIS script written ($($lines.Count) lines)"

      - name: Build installer
        shell: pwsh
        run: |
          & "C:\Program Files (x86)\NSIS\makensis.exe" installer.nsi
          $mb = [math]::Round((Get-Item NexaSetup.exe).Length/1MB, 1)
          Write-Host "NexaSetup.exe ready: $mb MB"

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: NexaSetup-Windows-x64
          path: NexaSetup.exe
          retention-days: 90

      - name: Create GitHub Release
        if: github.ref == 'refs/heads/main'
        continue-on-error: true   # Don't fail the build if release permissions are missing
        uses: softprops/action-gh-release@v2
        with:
          tag_name: build-${{ github.run_number }}
          name: "Nexa Download Manager — Build ${{ github.run_number }}"
          body: |
            ## Nexa Download Manager — Windows Installer

            ### Install karna (sirf 2 steps):
            1. `NexaSetup.exe` download karein → **Run as administrator** → Install
            2. Chrome: `chrome://extensions/` → Developer mode ON → **Load unpacked**
               → `C:\Program Files\Nexa Download Manager\extension-chromium`

            **Included:** nexa.exe · yt-dlp · ffmpeg · libtorrent · Chrome extension · native host auto-registered

            Built from: ${{ github.sha }}
          files: NexaSetup.exe
          draft: false
          prerelease: false
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

  # ── Prove the .deb is fully self-contained ────────────────────────────────
  # Install it in a CLEAN ubuntu:24.04 container (same glibc as the builder, but
  # NO Qt / libtorrent / fontconfig / xcb — nothing the app needs). Then assert
  # every bundled binary AND every bundled Qt plugin resolves all its libraries.
  # If the build weren't self-contained, ldd would print "not found" and we fail.
  # glibc + libstdc++/libgcc + the GL stack come from the base image by design —
  # those are the libraries you cannot relocate.
  verify-offline:
    name: Verify .deb is self-contained (clean container)
    needs: linux
    runs-on: ubuntu-latest
    container: ubuntu:24.04
    defaults:
      run:
        shell: bash
    steps:
      - name: Download .deb artifact
        uses: actions/download-artifact@v4
        with:
          name: nexa-linux-amd64-deb

      - name: Install into a bare system
        run: |
          set -e
          apt-get update
          # Install ONLY the .deb and whatever it declares (libc6, libstdc++6,
          # libgcc-s1, libgl1, libegl1). NO qt6 / libtorrent here — if the build
          # weren't self-contained, the next step would find missing libraries.
          apt-get install -y ./nexa_0.1.0_amd64.deb

      - name: Assert nothing is missing
        run: |
          set -e
          fail=0
          check() {
            local missing
            missing=$(ldd "$1" 2>/dev/null | grep -i "not found" || true)
            if [ -n "$missing" ]; then
              echo "❌ $1"; echo "$missing"; fail=1
            else
              echo "✅ $1"
            fi
          }
          check /usr/lib/nexa/nexa
          check /usr/lib/nexa/nexa-host
          for p in $(find /usr/lib/nexa/plugins -name '*.so'); do check "$p"; done
          test -f /usr/lib/nexa/plugins/platforms/libqxcb.so \
            && echo "✅ xcb platform plugin present" \
            || { echo "❌ xcb platform plugin MISSING"; fail=1; }
          test -f /usr/lib/nexa/plugins/sqldrivers/libqsqlite.so \
            && echo "✅ sqlite driver present" \
            || { echo "❌ sqlite driver MISSING"; fail=1; }
          test -n "$(find /usr/lib/nexa/plugins/tls -name '*.so' 2>/dev/null)" \
            && echo "✅ TLS backend present (https works)" \
            || { echo "❌ TLS backend MISSING — every https download would fail"; fail=1; }
          if [ "$fail" -ne 0 ]; then
            echo "::error::.deb is NOT self-contained — see missing libs above"
            exit 1
          fi
          echo "🎉 .deb is fully self-contained"
