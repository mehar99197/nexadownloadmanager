name: build

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]
  workflow_dispatch:

jobs:
  # ── Linux CI ───────────────────────────────────────────────────────────────
  linux:
    name: Build (Ubuntu + torrent)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Install toolchain
        run: |
          sudo apt-get update
          sudo apt-get install -y cmake ninja-build \
            qt6-base-dev libqt6sql6-sqlite \
            libtorrent-rasterbar-dev ffmpeg

      - name: Configure & Build
        run: |
          cmake -B build -G Ninja -DCMAKE_BUILD_TYPE=Release
          cmake --build build

      - name: Smoke test
        run: test -x build/nexa && test -x build/nexa-host

  # ── Windows self-contained installer (no libtorrent — avoids 40 min vcpkg) ─
  windows:
    name: Windows installer (self-contained)
    runs-on: windows-latest
    if: github.event_name != 'pull_request'

    steps:
      - uses: actions/checkout@v4

      # ── Qt6 ────────────────────────────────────────────────────────────────
      - name: Install Qt6
        uses: jurplel/install-qt-action@v4
        with:
          version: '6.7.3'
          host: windows
          target: desktop
          arch: win64_msvc2019_64
          cache: true

      # ── Build nexa.exe + nexa-host.exe (torrent disabled = no vcpkg needed) ─
      - name: Configure
        run: |
          cmake -B build -G "Visual Studio 17 2022" -A x64 `
            -DCMAKE_BUILD_TYPE=Release `
            -DNEXA_TORRENT=OFF
        shell: pwsh

      - name: Build
        run: cmake --build build --config Release
        shell: pwsh

      # ── Bundle Qt DLLs ─────────────────────────────────────────────────────
      - name: Bundle Qt DLLs
        run: |
          New-Item -ItemType Directory -Path dist -Force
          Copy-Item build\Release\nexa.exe      dist\
          Copy-Item build\Release\nexa-host.exe dist\
          windeployqt --release --no-translations --no-compiler-runtime dist\nexa.exe
        shell: pwsh

      # ── Bundle yt-dlp.exe ──────────────────────────────────────────────────
      - name: Bundle yt-dlp
        run: |
          Invoke-WebRequest `
            -Uri "https://github.com/yt-dlp/yt-dlp/releases/latest/download/yt-dlp.exe" `
            -OutFile dist\yt-dlp.exe
        shell: pwsh

      # ── Bundle ffmpeg.exe (static) ─────────────────────────────────────────
      - name: Bundle ffmpeg
        run: |
          Invoke-WebRequest `
            -Uri "https://github.com/BtbN/FFmpeg-Builds/releases/download/latest/ffmpeg-master-latest-win64-gpl.zip" `
            -OutFile ffmpeg.zip
          Expand-Archive ffmpeg.zip -DestinationPath ffmpeg_tmp
          $bin = Get-ChildItem -Recurse -Filter ffmpeg.exe ffmpeg_tmp | Select-Object -First 1
          Copy-Item $bin.FullName dist\ffmpeg.exe
          Remove-Item -Recurse -Force ffmpeg_tmp, ffmpeg.zip
        shell: pwsh

      # ── Bundle Chrome extension ─────────────────────────────────────────────
      - name: Bundle extension
        run: |
          Copy-Item -Recurse extension-chromium dist\extension-chromium
        shell: pwsh

      # ── NSIS installer ──────────────────────────────────────────────────────
      - name: Install NSIS
        run: choco install nsis --no-progress -y
        shell: pwsh

      - name: Write NSIS script
        shell: pwsh
        run: |
          $nsis = @'
          !include "MUI2.nsh"
          !include "EnvVarUpdate.nsh"

          Name "Nexa Download Manager"
          OutFile "NexaSetup.exe"
          Unicode True
          InstallDir "$PROGRAMFILES64\Nexa Download Manager"
          RequestExecutionLevel admin
          BrandingText "Nexa Download Manager"
          !define MUI_ABORTWARNING

          !insertmacro MUI_PAGE_WELCOME
          !insertmacro MUI_PAGE_DIRECTORY
          !insertmacro MUI_PAGE_INSTFILES
          !define MUI_FINISHPAGE_RUN "$INSTDIR\nexa.exe"
          !define MUI_FINISHPAGE_RUN_TEXT "Launch Nexa Download Manager"
          !insertmacro MUI_PAGE_FINISH

          !insertmacro MUI_UNPAGE_CONFIRM
          !insertmacro MUI_UNPAGE_INSTFILES
          !insertmacro MUI_LANGUAGE "English"

          Section "Install" SEC_MAIN
            SetOutPath "$INSTDIR"
            File /r "dist\*"

            ; Add to PATH so yt-dlp/ffmpeg are usable from anywhere
            ${EnvVarUpdate} $0 "PATH" "A" "HKLM" "$INSTDIR"

            ; Native messaging host manifest
            WriteRegStr HKCU \
              "Software\Google\Chrome\NativeMessagingHosts\com.nexa.host" \
              "" "$INSTDIR\com.nexa.host.json"
            WriteRegStr HKCU \
              "Software\Chromium\NativeMessagingHosts\com.nexa.host" \
              "" "$INSTDIR\com.nexa.host.json"

            ; Write the manifest file
            FileOpen  $0 "$INSTDIR\com.nexa.host.json" w
            FileWrite $0 '{$\n'
            FileWrite $0 '  "name": "com.nexa.host",$\n'
            FileWrite $0 '  "description": "Nexa Download Manager native messaging host",$\n'
            FileWrite $0 '  "path": "$INSTDIR\nexa-host.exe",$\n'
            FileWrite $0 '  "type": "stdio",$\n'
            FileWrite $0 '  "allowed_origins": ["chrome-extension://cbogjffoidaepbcbogbfibnldhkckhpb/"]$\n'
            FileWrite $0 '}$\n'
            FileClose $0

            ; Autostart background engine on Windows login
            WriteRegStr HKCU \
              "Software\Microsoft\Windows\CurrentVersion\Run" \
              "NexaDL" '"$INSTDIR\nexa.exe" --background'

            ; Add/Remove Programs
            WriteRegStr HKCU \
              "Software\Microsoft\Windows\CurrentVersion\Uninstall\NexaDL" \
              "DisplayName" "Nexa Download Manager"
            WriteRegStr HKCU \
              "Software\Microsoft\Windows\CurrentVersion\Uninstall\NexaDL" \
              "UninstallString" '"$INSTDIR\uninstall.exe"'
            WriteRegStr HKCU \
              "Software\Microsoft\Windows\CurrentVersion\Uninstall\NexaDL" \
              "DisplayIcon" "$INSTDIR\nexa.exe"

            WriteUninstaller "$INSTDIR\uninstall.exe"

            ; Shortcuts
            CreateDirectory "$SMPROGRAMS\Nexa Download Manager"
            CreateShortCut "$SMPROGRAMS\Nexa Download Manager\Nexa.lnk" "$INSTDIR\nexa.exe"
            CreateShortCut "$DESKTOP\Nexa Download Manager.lnk" "$INSTDIR\nexa.exe"
          SectionEnd

          Section "Uninstall"
            DeleteRegValue HKCU "Software\Microsoft\Windows\CurrentVersion\Run" "NexaDL"
            DeleteRegKey HKCU "Software\Google\Chrome\NativeMessagingHosts\com.nexa.host"
            DeleteRegKey HKCU "Software\Chromium\NativeMessagingHosts\com.nexa.host"
            ${un.EnvVarUpdate} $0 "PATH" "R" "HKLM" "$INSTDIR"
            RMDir /r "$INSTDIR"
            Delete "$DESKTOP\Nexa Download Manager.lnk"
            RMDir /r "$SMPROGRAMS\Nexa Download Manager"
            DeleteRegKey HKCU "Software\Microsoft\Windows\CurrentVersion\Uninstall\NexaDL"
          SectionEnd
          '@
          $nsis | Out-File -Encoding UTF8 installer.nsi

      - name: Download NSIS EnvVarUpdate plugin
        run: |
          Invoke-WebRequest `
            -Uri "https://nsis.sourceforge.io/mediawiki/images/a/ad/EnvVarUpdate.7z" `
            -OutFile EnvVarUpdate.7z
          7z e EnvVarUpdate.7z -o"C:\Program Files (x86)\NSIS\Include" EnvVarUpdate.nsh -y
          7z e EnvVarUpdate.7z -o"C:\Program Files (x86)\NSIS\Plugins\x86-unicode" EnvVarUpdate.dll -y
        shell: pwsh

      - name: Build installer
        run: |
          & "C:\Program Files (x86)\NSIS\makensis.exe" installer.nsi
          $size = [math]::Round((Get-Item NexaSetup.exe).Length / 1MB, 1)
          Write-Host "NexaSetup.exe ready: $size MB"
        shell: pwsh

      # ── Upload ──────────────────────────────────────────────────────────────
      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: NexaSetup-Windows-x64
          path: NexaSetup.exe
          retention-days: 90

      - name: Create GitHub Release
        if: github.ref == 'refs/heads/main'
        uses: softprops/action-gh-release@v2
        with:
          tag_name: build-${{ github.run_number }}
          name: "Nexa Download Manager — Build ${{ github.run_number }}"
          body: |
            ## Nexa Download Manager — Windows Installer

            ### Installation (2 steps only):

            **1.** Download `NexaSetup.exe` → right-click → **Run as administrator** → Next → Install

            **2.** Load Chrome extension:
            - Chrome → `chrome://extensions/` → **Developer mode** ON
            - **Load unpacked** → `C:\Program Files\Nexa Download Manager\extension-chromium`

            **Done!** Click any download link in Chrome — Nexa intercepts it automatically.

            ---
            Includes: **nexa.exe · yt-dlp · ffmpeg · Chrome extension · native host auto-registered**
            Built from commit: ${{ github.sha }}
          files: NexaSetup.exe
          draft: false
          prerelease: false
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
